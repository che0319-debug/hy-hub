name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_READ_SECRET: ${{ secrets.VITE_READ_SECRET }}
        run: npm run build

      - name: Inject dashboard secret
        run: |
          sed -i "s/__READ_SECRET__/${{ secrets.VITE_READ_SECRET }}/g" dist/personal-dashboard.html
          sed -i "s/__READ_SECRET__/${{ secrets.VITE_READ_SECRET }}/g" dist/950157-dashboard.html
          sed -i "s/__READ_SECRET__/${{ secrets.VITE_READ_SECRET }}/g" dist/family-dashboard.html
          sed -i "s/__READ_SECRET__/${{ secrets.VITE_READ_SECRET }}/g" dist/sam-dashboard.html

      - name: Encrypt gate (StatiCrypt)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.PAGE_PASSWORD }}
        run: npx staticrypt dist/index.html -d dist/ --short

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
